<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Screen</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
  <div class="loading-screen-content">
    <div class="c">
    <div class="crop">
    
      <img class="logo-image" src="img/logo.svg" alt="logo" class="logo-image">

    <div class="loading-screen-content-text">
      <span> Byte Development</span>
      <span><i class="fa-solid fa-angle-right"></i>We develop everything for speed and stability.</span>
    </div>
  </div>
  <div class="loading-data" id="loadingData" role="status" aria-live="polite">
    Loading assets...
  </div>
</div>
    <div class="progress-bar" id="progressBar" role="presentation" aria-hidden="true">
      <div class="progress-bar__segments" id="progressBarSegments"></div>
    </div>
  </div>
  <main class="loading-screen">
    <div class="c-nav">
      <nav class="top-nav" aria-label="Main menu">
        <button
          type="button"
          class="top-nav__item"
          data-nav="updates"
          aria-controls="updatePanel"
          aria-expanded="false"
        >
          Updates
        </button>
        <button
          type="button"
          class="top-nav__item"
          data-nav="rules"
          aria-controls="rulesPanel"
          aria-expanded="false"
        >
          Rules
        </button>
        <button
          type="button"
          class="top-nav__item"
          data-nav="keyboards"
          aria-controls="keyboardsPanel"
          aria-expanded="false"
        >
          Keyboards
        </button>
        <button
          type="button"
          class="top-nav__item"
          data-nav="settings"
          aria-controls="settingsPanel"
          aria-expanded="false"
        >
          Settings
        </button>
      </nav>
      <div class="panel" id="updatePanel" role="region" aria-label="Updates">
        <div class="update">
          <div class="update-hd" id="updatePanelHead"></div>
          <div class="update-body" id="updatePanelBody"></div>
        </div>
      </div>
      <div class="panel" id="rulesPanel" role="region" aria-label="Rules">
        <div class="update">
          <div class="update-hd" id="rulesPanelHead"></div>
          <div class="update-body" id="rulesPanelBody"></div>
        </div>
      </div>
      <div class="panel" id="keyboardsPanel" role="region" aria-label="Keyboards">
        <div class="update">
          <div class="update-hd" id="keyboardsPanelHead"></div>
          <div class="update-body" id="keyboardsPanelBody"></div>
        </div>
      </div>
      <div class="panel" id="settingsPanel" role="region" aria-label="Settings">
        <div class="update">
          <div class="update-hd">
            <div class="title"><i class="fa-solid fa-gear"></i> settings</div>
            <div class="disc">Loading screen preferences.</div>
          </div>
          <div class="update-body">
            <div class="settings-list">
              <div class="player-card" aria-label="Background media">
                <div class="player-card__top">
                  <div class="player-card__art">
                    <img src="img/logo.svg" width="72" height="72" alt="" />
                  </div>
                  <div class="player-card__meta">
                    <p class="player-card__title">Byte Load</p>
                    <p class="player-card__artist">Byte Development</p>
                  </div>
                </div>
                <div class="player-card__divider" aria-hidden="true"></div>
                <div class="player-card__bottom">
                  <div class="player-card__volume">
                    <label class="sr-only" for="masterVolume">Master volume</label>
                    <div class="player-card__volume-row">
                      <i class="fa-solid fa-volume-xmark" aria-hidden="true"></i>
                      <input
                        id="masterVolume"
                        class="volume-slider"
                        type="range"
                        min="0"
                        max="100"
                        step="1"
                        value="100"
                        aria-valuemin="0"
                        aria-valuemax="100"
                      />
                      <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
                    </div>
                  </div>
                  <div class="player-card__transport" role="group" aria-label="Playback">
                    <button type="button" class="player-card__btn" id="playerPrev" aria-label="Seek back 5 seconds">
                      <i class="fa-solid fa-backward" aria-hidden="true"></i>
                    </button>
                    <button type="button" class="player-card__btn player-card__btn--play" id="playerPlayPause" aria-label="Pause background">
                      <i class="fa-solid fa-pause" id="playerPlayPauseIcon" aria-hidden="true"></i>
                    </button>
                    <button type="button" class="player-card__btn" id="playerNext" aria-label="Seek forward 5 seconds">
                      <i class="fa-solid fa-forward" aria-hidden="true"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
  </div>
    <video class="bg-video" id="bgVideo" autoplay muted loop playsinline preload="auto">
      <source src="video/s.webm" type="video/mp4" />
    </video>
    <audio id="bgAudio" preload="auto" loop>
      <source src="video/s.weba" type="audio/mpeg" />
    </audio>
  </main>


  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
